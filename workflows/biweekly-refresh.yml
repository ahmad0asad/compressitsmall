name: Biweekly Date Refresh

# Runs on the 1st and 15th of every month at 06:00 UTC (~biweekly).
# You can also trigger it manually from the Actions tab to test it.
on:
  schedule:
    - cron: '0 6 1,15 * *'
  workflow_dispatch: {}

permissions:
  contents: write   # required so the workflow's token is allowed to push

jobs:
  refresh-dates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Refresh page and sitemap dates
        run: node scripts/refresh-dates.js

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet --cached || git commit -m "chore: biweekly date refresh"
          git push
